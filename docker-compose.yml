# Quick start:
#   cp .env.example .env
#   docker compose --env-file docker/.env.docker up -d --build
#
# Store:        http://localhost:8090
# Admin:        http://localhost:8090/admin  (admin@example.com / admin123)
# Mailpit:      http://localhost:8025
# Neo4j Browser http://localhost:17474  (neo4j / password)

services:
    app:
        build:
            context: .
            dockerfile: docker/Dockerfile
        image: bagisto-store-app
        ports:
            - "${APP_PORT:-8090}:80"
        environment:
            APP_URL: "http://localhost:${APP_PORT:-8090}"
            ASSET_URL: "http://localhost:${APP_PORT:-8090}"
            APP_ENV: local
            APP_DEBUG: "true"
            DB_CONNECTION: mysql
            DB_HOST: mysql
            DB_PORT: "3306"
            DB_DATABASE: bagisto
            DB_USERNAME: bagisto
            DB_PASSWORD: bagisto
            REDIS_HOST: redis
            REDIS_PORT: 6379
            ELASTICSEARCH_HOST: http://elasticsearch:9200
            MAIL_HOST: mailpit
            MAIL_PORT: 1025
            RESPONSE_CACHE_ENABLED: "false"
            NEO4J_URI: bolt://neo4j:7687
            NEO4J_USERNAME: neo4j
            NEO4J_PASSWORD: password
            NEO4J_MCP_TRANSPORT: stdio
        volumes:
            - .:/var/www/html
            - bagisto-vendor:/var/www/html/vendor
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_healthy
            elasticsearch:
                condition: service_healthy
            neo4j:
                condition: service_healthy
        networks:
            - bagisto
        restart: unless-stopped

    mysql:
        image: mysql:8.0
        ports:
            - "${FORWARD_DB_PORT:-33066}:3306"
        environment:
            MYSQL_ROOT_PASSWORD: bagisto
            MYSQL_DATABASE: bagisto
            MYSQL_USER: bagisto
            MYSQL_PASSWORD: bagisto
        command: --default-authentication-plugin=mysql_native_password
        volumes:
            - bagisto-mysql:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ubagisto", "-pbagisto"]
            interval: 5s
            timeout: 5s
            retries: 30
            start_period: 30s
        networks:
            - bagisto
        restart: unless-stopped

    redis:
        image: redis:7-alpine
        ports:
            - "${FORWARD_REDIS_PORT:-6380}:6379"
        volumes:
            - bagisto-redis:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 3s
            retries: 10
        networks:
            - bagisto
        restart: unless-stopped

    elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:7.17.0
        ports:
            - "${FORWARD_ELASTICSEARCH_PORT:-9201}:9200"
        environment:
            - discovery.type=single-node
            - xpack.security.enabled=false
            - bootstrap.memory_lock=true
            - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
        ulimits:
            memlock:
                soft: -1
                hard: -1
        volumes:
            - bagisto-elasticsearch:/usr/share/elasticsearch/data
        healthcheck:
            test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
            interval: 10s
            timeout: 5s
            retries: 30
            start_period: 60s
        networks:
            - bagisto
        restart: unless-stopped

    neo4j:
        image: neo4j:5-community
        ports:
            - "${FORWARD_NEO4J_HTTP_PORT:-17474}:7474"
            - "${FORWARD_NEO4J_BOLT_PORT:-17687}:7687"
        environment:
            NEO4J_AUTH: neo4j/password
            NEO4J_PLUGINS: '["apoc"]'
            NEO4J_dbms_security_procedures_unrestricted: apoc.*
            NEO4J_dbms_security_procedures_allowlist: apoc.*
        volumes:
            - bagisto-neo4j:/data
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 30
            start_period: 40s
        networks:
            - bagisto
        restart: unless-stopped

    mailpit:
        image: axllent/mailpit:latest
        ports:
            - "${FORWARD_MAILPIT_PORT:-1025}:1025"
            - "${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025"
        networks:
            - bagisto
        restart: unless-stopped

networks:
    bagisto:
        driver: bridge

volumes:
    bagisto-mysql:
    bagisto-redis:
    bagisto-elasticsearch:
    bagisto-neo4j:
    bagisto-vendor:
