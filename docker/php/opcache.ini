; Bagisto performance tuning for Laravel Sail (php artisan serve / cli-server SAPI)
; Mounted into the container via docker-compose.yml.
; opcache.enable governs the cli-server SAPI used by `php artisan serve`.

opcache.enable=1
opcache.enable_cli=1
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=30000
opcache.save_comments=1

; validate_timestamps=0 means PHP NEVER stat()s source files to check for changes.
; This is the single most important speed setting on this Windows/Docker bind-mount:
; measured per-request cost of stat()-ing the ~2000 cached files is ~4.5s/page here,
; so timestamp validation (=1) makes every page ~5s while =0 makes it ~0.5s.
;
; TRADE-OFF: after editing PHP/Blade code you must reload the compiled cache for your
; changes to take effect. Run (from the project root):  ./reload-app.sh
; (it clears+rebuilds Laravel caches and restarts the dev server / opcache).
;
; Do NOT enable opcache.file_cache here: on this bind-mount it served stale compiled
; Blade views across edits, causing phantom "view not found" errors.
opcache.validate_timestamps=0
