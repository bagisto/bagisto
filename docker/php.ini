; Bagisto development PHP settings
memory_limit = 512M
upload_max_filesize = 100M
post_max_size = 110M
max_execution_time = 300
max_input_time = 300

display_errors = Off
log_errors = On
error_log = /proc/self/fd/2

date.timezone = UTC

opcache.enable = 1
opcache.memory_consumption = 128
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0

expose_php = Off
