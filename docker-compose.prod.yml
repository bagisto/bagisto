services:
    bagisto:
        build:
            context: ./docker/production
            dockerfile: Dockerfile
        image: bagisto:latest
        restart: unless-stopped
        ports:
            - '${APP_PORT:-80}:80'
        environment:
            APP_URL: '${APP_URL}'
            APP_KEY: '${APP_KEY}'
            APP_LOCALE: '${APP_LOCALE:-pt_BR}'
            APP_CURRENCY: '${APP_CURRENCY:-BRL}'
            APP_TIMEZONE: '${APP_TIMEZONE:-America/Sao_Paulo}'
            APP_DEBUG: 'false'

            DB_HOST: '${DB_HOST:-mysql}'
            DB_PORT: '${DB_PORT:-3306}'
            DB_DATABASE: '${DB_DATABASE:-bagisto}'
            DB_USERNAME: '${DB_USERNAME:-bagisto}'
            DB_PASSWORD: '${DB_PASSWORD}'

            QUEUE_CONNECTION: '${QUEUE_CONNECTION:-database}'
            QUEUE_WORKER_NUMPROCS: '${QUEUE_WORKER_NUMPROCS:-2}'

            CACHE_STORE: '${CACHE_STORE:-file}'
            REDIS_HOST: '${REDIS_HOST:-redis}'
            REDIS_PORT: '${REDIS_PORT:-6379}'
            REDIS_PASSWORD: '${REDIS_PASSWORD:-null}'

            MAIL_MAILER: '${MAIL_MAILER:-smtp}'
            MAIL_HOST: '${MAIL_HOST}'
            MAIL_PORT: '${MAIL_PORT:-587}'
            MAIL_USERNAME: '${MAIL_USERNAME}'
            MAIL_PASSWORD: '${MAIL_PASSWORD}'
        volumes:
            - bagisto-storage:/var/www/bagisto/storage
            - bagisto-logs:/var/www/bagisto/storage/logs
        depends_on:
            mysql:
                condition: service_healthy
        networks:
            - bagisto-network
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost/health']
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 60s

    mysql:
        image: 'mysql:8.0'
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: '${MYSQL_ROOT_PASSWORD}'
            MYSQL_DATABASE: '${DB_DATABASE:-bagisto}'
            MYSQL_USER: '${DB_USERNAME:-bagisto}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
        volumes:
            - bagisto-mysql:/var/lib/mysql
        networks:
            - bagisto-network
        healthcheck:
            test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p${MYSQL_ROOT_PASSWORD}']
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s

    redis:
        image: 'redis:7-alpine'
        restart: unless-stopped
        command: redis-server --requirepass ${REDIS_PASSWORD:-}
        volumes:
            - bagisto-redis:/data
        networks:
            - bagisto-network
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 10s
            timeout: 5s
            retries: 3

networks:
    bagisto-network:
        driver: bridge

volumes:
    bagisto-mysql:
        driver: local
    bagisto-storage:
        driver: local
    bagisto-logs:
        driver: local
    bagisto-redis:
        driver: local
